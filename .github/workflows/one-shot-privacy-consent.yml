name: One-shot Integra privacy consent

on:
  push:
    branches:
      - security/producao-real-v1
    paths:
      - .github/workflows/one-shot-privacy-consent.yml

permissions:
  contents: write

jobs:
  privacy-consent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: security/producao-real-v1

      - name: Add explicit consent flow
        run: |
          python - <<'PY'
          from pathlib import Path

          page = Path('app/integra/page.tsx')
          source = page.read_text(encoding='utf-8')

          if 'const [privacyAccepted, setPrivacyAccepted]' not in source:
              source = source.replace(
                  "  const [error, setError] = useState('');",
                  "  const [error, setError] = useState('');\n  const [privacyAccepted, setPrivacyAccepted] = useState(false);",
                  1,
              )

          marker = """    setLoading(true);
    setError('');
    try {
      const response = await fetch('/api/integra', {"""
          if 'Leia e confirme o aviso de privacidade' not in source:
              source = source.replace(
                  marker,
                  """    if (!privacyAccepted) {
      setError('Leia e confirme o aviso de privacidade antes de enviar.');
      return;
    }

    setLoading(true);
    setError('');
    try {
      const response = await fetch('/api/integra', {""",
                  1,
              )

          source = source.replace(
              'body: JSON.stringify(data),',
              'body: JSON.stringify({ ...data, privacy_accepted: privacyAccepted }),',
              1,
          )

          confirm = '<div className="integra-confirm-note"><Check size={18} /><span>Ao confirmar, esta ficha será enviada uma única vez para a CEAMI.</span></div>'
          if 'integra-privacy-consent' not in source:
              consent = """<label className={`integra-privacy-consent ${privacyAccepted ? 'checked' : ''}`}>
                <input type="checkbox" checked={privacyAccepted} onChange={(event) => setPrivacyAccepted(event.target.checked)} />
                <i>{privacyAccepted && <Check size={15} />}</i>
                <span>Li o <Link href="/privacidade" target="_blank">Aviso de Privacidade</Link> e estou ciente do uso destes dados pela CEAMI para cadastro, cuidado de membros, cursos e comunicação.</span>
              </label>
              """ + confirm
              source = source.replace(confirm, consent, 1)

          source = source.replace(
              '<p className="integra-footer">Seus dados serão usados somente para o cuidado e relacionamento da CEAMI.</p>',
              '<p className="integra-footer">Seus dados serão usados para as finalidades informadas no <Link href="/privacidade">Aviso de Privacidade</Link>.</p>',
              1,
          )

          required = ['privacyAccepted', 'integra-privacy-consent', 'privacy_accepted: privacyAccepted']
          missing = [item for item in required if item not in source]
          if missing:
              raise SystemExit(f'Integra privacy patch incomplete: {missing}')
          page.write_text(source, encoding='utf-8')

          route = Path('app/api/integra/route.ts')
          route_source = route.read_text(encoding='utf-8')
          if 'body.privacy_accepted !== true' not in route_source:
              line = "    const body = await readLimitedJson<IntegraBody>(request, 20_000);"
              route_source = route_source.replace(
                  line,
                  line + """

    if (body.privacy_accepted !== true) {
      return NextResponse.json({ error: 'Confirme o aviso de privacidade antes de enviar.' }, { status: 400 });
    }""",
                  1,
              )
          if 'body.privacy_accepted !== true' not in route_source:
              raise SystemExit('Integra API privacy validation was not added.')
          route.write_text(route_source, encoding='utf-8')

          css = Path('app/integra/integra.css')
          css_source = css.read_text(encoding='utf-8')
          if '.integra-privacy-consent{' not in css_source and '.integra-privacy-consent {' not in css_source:
              css_source += """
.integra-privacy-consent{display:grid;grid-template-columns:auto minmax(0,1fr);align-items:start;gap:10px;border:1px solid #d6e0e4;border-radius:14px;padding:14px;background:#f7fafb;color:#48616d;line-height:1.5;cursor:pointer}.integra-privacy-consent.checked{border-color:#3d8f6e;background:#eef8f3}.integra-privacy-consent input{position:absolute;opacity:0;pointer-events:none}.integra-privacy-consent i{width:22px;height:22px;display:grid;place-items:center;border:1px solid #9fb0b8;border-radius:7px;background:#fff;color:#fff}.integra-privacy-consent.checked i{border-color:#247354;background:#247354}.integra-privacy-consent a,.integra-footer a{color:#d94718;font-weight:800}
"""
          css.write_text(css_source, encoding='utf-8')
          PY

      - name: Commit consent flow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/integra/page.tsx app/integra/integra.css app/api/integra/route.ts
          git commit -m "privacy: require explicit Integra notice acknowledgement"
          git push origin HEAD:security/producao-real-v1
