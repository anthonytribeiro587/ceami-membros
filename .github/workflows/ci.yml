name: CEAMI Production Check

on:
  pull_request:
  push:
    branches:
      - main
      - security/**

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-public-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      API_RATE_LIMIT_SALT: test-rate-limit-salt
      EVOLUTION_API_URL: https://example.invalid
      EVOLUTION_API_KEY: test-evolution-key
      EVOLUTION_INSTANCE: ceamirs
      EVOLUTION_GROUP_ID: 120363148206200208@g.us

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package.json

      - name: Install exact dependencies
        run: npm install --no-fund --no-audit

      - name: Production dependency audit
        shell: bash
        run: |
          set +e
          npm audit --omit=dev --audit-level=high --json > audit.json
          AUDIT_EXIT=$?
          set -e
          node - <<'NODE'
          const fs = require('fs');
          const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
          const vulnerabilities = audit.vulnerabilities || {};
          const blocked = Object.entries(vulnerabilities)
            .filter(([, value]) => ['high', 'critical'].includes(value.severity))
            .map(([name, value]) => `${name}: ${value.severity}; corrigível=${JSON.stringify(value.fixAvailable)}`);
          if (blocked.length) {
            console.error(`Vulnerabilidades bloqueantes (${blocked.length}):`);
            for (const item of blocked) console.error(`- ${item}`);
            process.exit(1);
          }
          console.log('Nenhuma vulnerabilidade HIGH ou CRITICAL em dependências de produção.');
          NODE
          exit $AUDIT_EXIT

      - name: TypeScript
        run: npm run typecheck

      - name: Security invariants
        run: npm test

      - name: Production build
        run: npm run build
