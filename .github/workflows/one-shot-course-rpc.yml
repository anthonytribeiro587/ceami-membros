name: One-shot course member RPC migration

on:
  push:
    branches:
      - security/producao-real-v1
    paths:
      - .github/workflows/one-shot-course-rpc.yml

permissions:
  contents: write

jobs:
  replace-query:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: security/producao-real-v1

      - name: Replace full member-table query
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/cursos/CoursesWorkspace.tsx')
          source = path.read_text(encoding='utf-8')
          old = "supabase.from('members').select('id, full_name, phone').order('full_name'),"
          new = "supabase.rpc('get_course_member_options'),"

          if old not in source:
              raise SystemExit('Expected member query was not found; no file was changed.')

          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Commit restricted query
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/cursos/CoursesWorkspace.tsx
          git commit -m "refactor: use restricted course member rpc"
          git push origin HEAD:security/producao-real-v1
