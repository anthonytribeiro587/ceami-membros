name: One-shot course table integration

on:
  push:
    branches:
      - security/producao-real-v1
    paths:
      - .github/workflows/one-shot-course-table.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: security/producao-real-v1

      - name: Integrate responsive table component
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/cursos/CoursesWorkspace.tsx')
          source = path.read_text(encoding='utf-8')

          import_marker = "import { createClient } from '@/lib/supabase/client';"
          table_import = "import CourseClassTable from './CourseClassTable';"
          if table_import not in source:
              if import_marker not in source:
                  raise SystemExit('Supabase import marker not found.')
              source = source.replace(import_marker, import_marker + "\n" + table_import, 1)

          active_metric = """            <article>
              <GraduationCap />
              <div><small>Turmas ativas</small><strong>{classes.filter((item) => item.status === 'open').length}</strong></div>
            </article>
"""
          source = source.replace(active_metric, '', 1)

          start = source.find('            {classes.length ? (\n              <div className="class-grid">')
          end_marker = '            ) : (\n              <div className="courses-empty">'
          end = source.find(end_marker, start)
          if start == -1 or end == -1:
              raise SystemExit('Course card grid boundaries not found.')

          replacement = """            {classes.length ? (
              <CourseClassTable
                classes={classes}
                onOpen={(item) => setSelectedClass(item)}
              />
"""
          source = source[:start] + replacement + source[end:]

          required = [table_import, '<CourseClassTable', 'classes={classes}']
          missing = [item for item in required if item not in source]
          if missing:
              raise SystemExit(f'Course table integration incomplete: {missing}')

          path.write_text(source, encoding='utf-8')
          PY

      - name: Commit table integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/cursos/CoursesWorkspace.tsx
          git commit -m "ui: integrate responsive course table"
          git push origin HEAD:security/producao-real-v1
