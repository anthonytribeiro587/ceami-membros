name: CEAMI Production Check

on:
  pull_request:
  push:
    branches:
      - main
      - security/**

permissions:
  contents: read

jobs:
  integrate-course-table:
    if: "${{ github.event_name == 'push' && github.ref == 'refs/heads/security/producao-real-v1' && github.event.head_commit.message != 'course-table-integrated' }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout security branch
        uses: actions/checkout@v4
        with:
          ref: security/producao-real-v1

      - name: Integrate table component
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/cursos/CoursesWorkspace.tsx')
          source = path.read_text(encoding='utf-8')

          import_marker = "import { createClient } from '@/lib/supabase/client';"
          table_import = "import CourseClassTable from './CourseClassTable';"
          if table_import not in source:
              if import_marker not in source:
                  raise SystemExit('Supabase import marker not found.')
              source = source.replace(import_marker, import_marker + "\n" + table_import, 1)

          active_metric = """            <article>
              <GraduationCap />
              <div><small>Turmas ativas</small><strong>{classes.filter((item) => item.status === 'open').length}</strong></div>
            </article>
"""
          source = source.replace(active_metric, '', 1)

          start_marker = '            {classes.length ? (\n              <div className="class-grid">'
          end_marker = '            ) : (\n              <div className="courses-empty">'
          start = source.find(start_marker)
          end = source.find(end_marker, start)
          if start == -1 or end == -1:
              raise SystemExit('Course card grid boundaries not found.')

          replacement = """            {classes.length ? (
              <CourseClassTable
                classes={classes}
                onOpen={(item) => setSelectedClass(item)}
              />
"""
          source = source[:start] + replacement + source[end:]

          if table_import not in source or '<CourseClassTable' not in source:
              raise SystemExit('Course table integration incomplete.')

          path.write_text(source, encoding='utf-8')
          PY

      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/cursos/CoursesWorkspace.tsx
          git commit -m "course-table-integrated"
          git push origin HEAD:security/producao-real-v1

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ceami_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ceami_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-public-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      API_RATE_LIMIT_SALT: test-rate-limit-salt
      EVOLUTION_API_URL: https://example.invalid
      EVOLUTION_API_KEY: test-evolution-key
      EVOLUTION_INSTANCE: ceamirs
      EVOLUTION_GROUP_ID: 120363148206200208@g.us
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci --no-fund --no-audit

      - name: Production dependency audit
        id: audit
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm audit --omit=dev --audit-level=high --json > audit.json
          AUDIT_EXIT=$?
          set -e
          node - <<'NODE'
          const fs = require('fs');
          const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));
          const vulnerabilities = audit.vulnerabilities || {};
          const blocked = Object.entries(vulnerabilities)
            .filter(([, value]) => ['high', 'critical'].includes(value.severity))
            .map(([name, value]) => `${name}: ${value.severity}; corrigível=${JSON.stringify(value.fixAvailable)}`);
          const report = blocked.length
            ? `Vulnerabilidades bloqueantes (${blocked.length}):\n${blocked.map((item) => `- ${item}`).join('\n')}\n`
            : 'Nenhuma vulnerabilidade HIGH ou CRITICAL em dependências de produção.\n';
          fs.writeFileSync('audit-report.txt', report);
          console.log(report);
          process.exit(blocked.length ? 1 : 0);
          NODE
          exit $AUDIT_EXIT

      - name: Upload dependency audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: |
            audit.json
            audit-report.txt
          retention-days: 3

      - name: Enforce dependency audit
        if: steps.audit.outcome == 'failure'
        run: |
          cat audit-report.txt
          exit 1

      - name: TypeScript
        run: npm run typecheck

      - name: Security invariants
        run: npm test

      - name: Execute hardening migrations
        run: |
          psql -h 127.0.0.1 -U postgres -d ceami_test -f tests/sql/production_hardening_setup.sql
          for migration in \
            supabase/migrations/202607220001_production_hardening.sql \
            supabase/migrations/202607220002_access_admin_and_maintenance.sql \
            supabase/migrations/202607220003_view_hardening.sql \
            supabase/migrations/202607220004_course_member_minimum_access.sql
          do
            echo "Executando $migration"
            psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U postgres -d ceami_test -f "$migration"
          done
          psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U postgres -d ceami_test -c "select public.get_course_member_options();" >/dev/null

      - name: Production build
        run: npm run build
